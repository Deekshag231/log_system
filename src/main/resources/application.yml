server:
  port: 8080

spring:
  application:
    name: log-monitor
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/}
      database: ${SPRING_DATA_MONGODB_DATABASE:test}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      client-id: log-monitor-producer
      acks: all
      retries: 5
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: log-monitor-consumer-group
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.logmonitor.dto
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.logmonitor.dto.LogKafkaMessage
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

logmonitor:
  kafka:
    topic:
      logs: logs.raw
  alert:
    error-threshold-per-minute: 100
    sliding-window-seconds: 60
  dedup:
    ttl-hours: 24
    max-entries: 500000
  temp-store:
    max-entries: 2000

security:
  auth:
    username: ${APP_AUTH_USERNAME:admin}
    password: ${APP_AUTH_PASSWORD:admin123}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    issuer: ${JWT_ISSUER:log-monitor}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    secret: ${JWT_SECRET:log-monitor-super-secret-key-please-change-in-production-32bytes-min}

logging:
  level:
    root: INFO
    com.logmonitor: DEBUG
    org.springframework.kafka: INFO
    org.elasticsearch.client: WARN
